services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dat_poker
      POSTGRES_PASSWORD: dat_poker
      POSTGRES_DB: dat_poker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      API_PORT: 4000
      CHIA_GAMING_LOBBY_URL: http://host.docker.internal:3001
      CHIA_GAMING_GAME_URL: http://host.docker.internal:3000
    depends_on:
      - redis
      - postgres

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "4100:4100"
    environment:
      GATEWAY_PORT: 4100
    depends_on:
      - redis

volumes:
  pgdata:
